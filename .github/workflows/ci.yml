name: CI Pipeline
 
on:
  push:
    branches: [main, desarrollo_DevOps]
  pull_request:
    branches: [main, desarrollo_DevOps]
    
permissions:
  contents: read
  security-events: write
  
env:
  NODE_VERSION: '20'
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-demo-app
 
jobs:
  lint-and-test:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npx eslint src/ tests/ || true
      - run: npm test
      - name: Upload coverage
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 5
  sonarqube:
     
     runs-on: ubuntu-latest
     name: "Code analysis - SonarQube"
     steps:
       - name: Checkout Code
         uses: actions/checkout@v4
         with:
           fetch-depth: 0 # Required for accurate analysis of branches/PRs
 
       - name: Set up Node.js
         uses: actions/setup-node@v4
         with:
           node-version: ${{ env.NODE_VERSION }} # Or the version you are using
 
       - name: Install Dependencies
         run: npm install
 
       - name: Run Tests with Coverage
         run: npm test -- --coverage # Ensure this command generates an lcov.info file
 
       - name: SonarQube Scan
         uses: SonarSource/sonarqube-scan-action@v2.1.0
         env:
           SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  security-scan:
    name: "Security Audit"
    runs-on: ubuntu-latest
    needs: [lint-and-test, sonarqube]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high || true
  snyk-scan:
    name: "Dependecies analysis - Snyk"
    runs-on: ubuntu-latest
    needs: [lint-and-test, sonarqube]
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
    - name: Install dependencies
      run: npm install
    - name: Run Snyk scan
      uses: snyk/actions/node@master
      with:
        args: --file=package.json --severity-threshold=medium --sarif-file-output=snyk.sarif
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true # Allows the workflow to continue even if issues are found, so the SARIF file can be uploaded
    - name: Upload Snyk results to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: snyk.sarif
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [lint-and-test, sonarqube]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
 
  docker-push:
    name: "Docker Push (Multi-Arch)"
    runs-on: ubuntu-latest
    needs: [lint-and-test, security-scan, docker-build, snyk-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

