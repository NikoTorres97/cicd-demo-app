apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-secrets-list-binding
  namespace: production
subjects:
- kind: ServiceAccount
  name: default # Assuming the service account name is 'default' as per the error
  namespace: production # Replace with the actual namespace where Jenkins is running
roleRef:
  kind: Role
  name: jenkins-secrets-list-role
  apiGroup: rbac.authorization.k8s.io
